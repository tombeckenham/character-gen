name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      # The shipped CLI runs on the user's Node via type stripping; tests run
      # under `node --test`, so CI must pin the same floor as `engines`.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run test
      - run: bun run build:gallery
